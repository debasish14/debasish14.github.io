<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debasish Borah — Resume</title>
  <meta name="description"
    content="Resume of Debasish Borah — Digital Specialist Engineer, Data Engineering, Cloud & DevOps." />

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container" id="resume"></div>

  <script>
    /* ── Helpers ──────────────────────────────────────────── */
    const $ = (tag, cls, html) => {
      const el = document.createElement(tag);
      if (cls) el.className = cls;
      if (html) el.innerHTML = html;
      return el;
    };

    const formatDate = (d) => {
      if (!d || d === 'Present') return 'Present';
      const [y, m] = d.split('-');
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      return `${months[parseInt(m, 10) - 1]} ${y}`;
    };

    const prettifyKey = (key) =>
      key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())
        .replace('Cloud Devops', 'Cloud & DevOps')
        .replace('Os', 'OS');

    /* ── Render ───────────────────────────────────────────── */
    async function render() {
      const res = await fetch('assets/resume.json');
      const data = await res.json();
      const root = document.getElementById('resume');

      /* Header */
      const header = $('header', 'header');

      const headerRow = $('div', 'header-row');
      const avatar = document.createElement('img');
      avatar.src = 'https://github.com/debasish14.png';
      avatar.alt = data.name;
      avatar.className = 'avatar';
      headerRow.appendChild(avatar);

      const headerInfo = $('div', 'header-info');
      headerInfo.appendChild($('h1', null, data.name));

      const contact = $('div', 'contact-row');
      const c = data.contact;
      const icons = {
        email: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>',
        github: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.009-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.6 9.6 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>',
        linkedin: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>',
        location: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>',
      };
      const items = [
        `<a href="mailto:${c.email}"><span class="contact-icon">${icons.email}</span>${c.email}</a>`,
        `<a href="https://github.com/${c.github}" target="_blank" rel="noopener"><span class="contact-icon">${icons.github}</span>github.com/${c.github}</a>`,
        `<a href="https://linkedin.com/in/${c.linkedin}" target="_blank" rel="noopener"><span class="contact-icon">${icons.linkedin}</span>linkedin.com/in/${c.linkedin}</a>`,
        `<span><span class="contact-icon">${icons.location}</span>${c.location}</span>`,
      ];
      contact.innerHTML = items.join('<span class="separator">·</span>');
      headerInfo.appendChild(contact);
      headerRow.appendChild(headerInfo);
      header.appendChild(headerRow);
      root.appendChild(header);

      /* Experience */
      if (data.experience && data.experience.length) {
        const sec = $('section', 'section');
        sec.appendChild($('h2', 'section-title', 'Experience'));
        const orgLogos = {
          'Infosys': 'assets/infosys-transparent-infosys-free-free-png.webp',
        };
        data.experience.forEach(exp => {
          const entry = $('div', 'entry');
          const entryBody = $('div', 'entry-with-logo');
          if (orgLogos[exp.company]) {
            const logo = document.createElement('img');
            logo.src = orgLogos[exp.company];
            logo.alt = exp.company;
            logo.className = 'org-logo';
            entryBody.appendChild(logo);
          }
          const content = $('div', 'entry-content');
          const hdr = $('div', 'entry-header');
          hdr.appendChild($('span', 'entry-title', exp.role));
          hdr.appendChild($('span', 'entry-date', `${formatDate(exp.start)} — ${formatDate(exp.end)}`));
          content.appendChild(hdr);
          content.appendChild($('div', 'entry-org', exp.company));
          if (exp.highlights && exp.highlights.length) {
            const ul = $('ul', 'entry-highlights');
            exp.highlights.forEach(h => ul.appendChild($('li', null, h)));
            content.appendChild(ul);
          }
          entryBody.appendChild(content);
          entry.appendChild(entryBody);
          sec.appendChild(entry);
        });
        root.appendChild(sec);
      }

      /* Education */
      if (data.education && data.education.length) {
        const sec = $('section', 'section');
        sec.appendChild($('h2', 'section-title', 'Education'));
        const eduLogos = {
          'Manipal University Jaipur': 'assets/MUJ-Logo.png',
        };
        data.education.forEach(edu => {
          const entry = $('div', 'entry');
          const entryBody = $('div', 'entry-with-logo');
          if (eduLogos[edu.institution]) {
            const logo = document.createElement('img');
            logo.src = eduLogos[edu.institution];
            logo.alt = edu.institution;
            logo.className = 'org-logo';
            entryBody.appendChild(logo);
          }
          const content = $('div', 'entry-content');
          const hdr = $('div', 'entry-header');
          hdr.appendChild($('span', 'entry-title', edu.degree));
          hdr.appendChild($('span', 'entry-date', `${formatDate(edu.start)} — ${formatDate(edu.end)}`));
          content.appendChild(hdr);
          const org = edu.specialization
            ? `${edu.institution} · <em>${edu.specialization}</em>`
            : edu.institution;
          content.appendChild($('div', 'entry-org', org));
          entryBody.appendChild(content);
          entry.appendChild(entryBody);
          sec.appendChild(entry);
        });
        root.appendChild(sec);
      }

      /* Projects */
      if (data.projects && data.projects.length) {
        const sec = $('section', 'section');
        sec.appendChild($('h2', 'section-title', 'Projects'));
        data.projects.forEach(proj => {
          const card = $('div', 'project-card');
          card.appendChild($('div', 'project-name', proj.name));
          card.appendChild($('div', 'project-desc', proj.description));
          if (proj.stack && proj.stack.length) {
            const tags = $('div', 'tag-list');
            proj.stack.forEach(s => tags.appendChild($('span', 'tag', s)));
            card.appendChild(tags);
          }
          sec.appendChild(card);
        });
        root.appendChild(sec);
      }

      /* Skills */
      if (data.skills) {
        const sec = $('section', 'section');
        sec.appendChild($('h2', 'section-title', 'Skills'));
        const grid = $('div', 'skills-grid');
        Object.entries(data.skills).forEach(([key, vals]) => {
          const group = $('div', 'skill-group');
          group.appendChild($('h3', null, prettifyKey(key)));
          const tags = $('div', 'tag-list');
          vals.forEach(v => tags.appendChild($('span', 'tag', v)));
          group.appendChild(tags);
          grid.appendChild(group);
        });
        sec.appendChild(grid);
        root.appendChild(sec);
      }

      /* Certifications */
      if (data.certifications && data.certifications.length) {
        const sec = $('section', 'section');
        sec.appendChild($('h2', 'section-title', 'Certifications'));
        const ul = $('ul', 'cert-list');
        data.certifications.forEach(cert => ul.appendChild($('li', null, cert)));
        sec.appendChild(ul);
        root.appendChild(sec);
      }

      /* Footer */
      const footer = $('footer', 'footer');
      footer.innerHTML = `<3 · ${new Date().getFullYear()}`;
      root.appendChild(footer);
    }

    render();
  </script>
</body>

</html>
